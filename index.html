<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Pro Weather Forecast</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="weatherAnim"></div>

    <div class="app">
        <div class="search">
            <input id="searchInput" placeholder="Search city..." spellcheck="false" />
            <button id="searchBtn">🔍</button>
        </div>

        <div class="glass-panel hero-card">
            <div class="character-box">
                <img id="weatherGif" src="" alt="weather-status">
            </div>
            <div class="main-info">
                <h1 id="temp">--°</h1>
                <h2 id="city">Loading...</h2>
                <p id="conditionText">--</p>
                <p>Feels like <span id="feels">--°</span></p>
            </div>
        </div>

        <div class="glass-panel chart-container">
            <canvas id="tempChart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="compass"><div id="arrow">↑</div></div>
                <p>Wind: <span id="windSpeed">--</span> m/s</p>
            </div>
            <div class="stat-item">
                <p>Humidity</p>
                <h3 id="humidity">--%</h3>
            </div>
            <div class="stat-item">
                <p>AQI</p>
                <h3 id="aqi">--</h3>
            </div>
        </div>

        <div class="glass-panel sun-section">
            <div class="sun-arc-box">
                <svg viewBox="0 0 300 130">
                    <path d="M20 120 Q150 10 280 120" stroke="rgba(255,255,255,0.3)" fill="none" stroke-width="3" />
                    <circle id="sunDot" cx="20" cy="120" r="6" fill="yellow" />
                </svg>
                <div class="sun-times">
                    <span>🌅 <small id="sunrise">--:--</small></span>
                    <span>🌇 <small id="sunset">--:--</small></span>
                </div>
            </div>
            <div class="moon-box">
                <div id="moonPhase"></div>
                <small>Moon Phase</small>
            </div>
        </div>

        <div class="glass-panel">
            <h3>5-Day Forecast</h3>
            <div id="forecast" class="forecast-grid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
